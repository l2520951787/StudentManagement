<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>受講生情報更新</title>
</head>
<body>
<h1>受講生情報更新</h1>
<form th:action="@{/updateStudent}" th:object="${studentDetail}" method="post">
  <div>
    <input type="hidden" id="id" th:field="*{student.id}"/>
  </div>
  <div>
    <label for="name">名前：</label>
    <input type="text" id="name" th:field="*{student.name}" required/>
  </div>
  <div>
    <label for="ruby">フリガナ：</label>
    <input type="text" id="ruby" th:field="*{student.ruby}" required/>
  </div>
  <div>
    <label for="nickname">ニックネーム：</label>
    <input type="text" id="nickname" th:field="*{student.nickname}" required/>
  </div>
  <div>
    <label for="mailAddress">メールアドレス：</label>
    <input type="text" id="mailAddress" th:field="*{student.mailAddress}" required/>
  </div>
  <div>
    <label for="area">地域：</label>
    <input type="text" id="area" th:field="*{student.area}" required/>
  </div>
  <div>
    <label for="age">年齢：</label>
    <input type="text" id="age" th:field="*{student.age}" required/>
  </div>
  <div>
    <p>性別：<br>
      <input type="radio" id="male" th:field="*{student.gender}" value="男">
      <label for="male">男性</label>
      <input type="radio" id="female" th:field="*{student.gender}" value="女">
      <label for="female">女性</label>
      <input type="radio" id="others" th:field="*{student.gender}" value="その他">
      <label for="others">その他</label>
    </p>
  </div>
  <div>
    <label for="remark">備考：</label>
    <input type="text" id="remark" th:field="*{student.remark}"/>
  </div>
  <div>
    <label for="deleted">キャンセル</label>
    <input type="checkbox" id="deleted" th:field="*{student.deleted}"/>
  </div>
  <div th:each="course, stat : *{studentsCourses}">
    <input type="hidden" id="studentCourse" th:id="studentsCourses.__${stat.index}__.id"
           th:field="*{studentsCourses[__${stat.index}__].id}"/>
    <label for="course" th:for="studentsCourses.__${stat.index}__.course">受講コース：</label>
    <input type="text" id="course" th:id="studentsCourses.__${stat.index}__.course"
           th:field="*{studentsCourses[__${stat.index}__].course}"/>
  </div>
  <div>
    <button type="submit">更新</button>
  </div>
</form>
</body>
</html>
